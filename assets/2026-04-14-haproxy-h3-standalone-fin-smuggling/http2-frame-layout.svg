<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 720 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="HTTP/2 frame layout: 9-byte header with Length, Type, Flags, and Stream ID, followed by variable payload." style="max-width:100%;height:auto;display:block;margin:1.5rem auto" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
  <text x="360" y="22" text-anchor="middle" font-size="13" fill="currentColor" font-weight="bold">HTTP/2 frame layout</text>
  <text x="360" y="38" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.7">9-byte fixed header + variable payload (RFC 7540 §4.1)</text>

  <text x="110" y="58" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.6">bytes 0–2</text>
  <text x="220" y="58" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.6">byte 3</text>
  <text x="300" y="58" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.6">byte 4</text>
  <text x="497" y="58" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.6">bytes 5–8</text>

  <rect x="40" y="66" width="140" height="62" fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.4"/>
  <text x="110" y="90" text-anchor="middle" font-size="12" fill="currentColor">Length</text>
  <text x="110" y="106" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.8">24 bits</text>
  <text x="110" y="120" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.8">payload size</text>

  <rect x="180" y="66" width="80" height="62" fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.4"/>
  <text x="220" y="90" text-anchor="middle" font-size="12" fill="currentColor">Type</text>
  <text x="220" y="106" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.8">8 bits</text>
  <text x="220" y="120" text-anchor="middle" font-size="9" fill="currentColor" opacity="0.8">DATA/HEADERS/…</text>

  <rect x="260" y="66" width="80" height="62" fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.4"/>
  <text x="300" y="90" text-anchor="middle" font-size="12" fill="currentColor">Flags</text>
  <text x="300" y="106" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.8">8 bits</text>
  <text x="300" y="120" text-anchor="middle" font-size="9" fill="currentColor" opacity="0.8">END_STREAM, …</text>

  <rect x="340" y="66" width="14" height="62" fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.4"/>
  <text x="347" y="99" text-anchor="middle" font-size="10" fill="currentColor">R</text>

  <rect x="354" y="66" width="286" height="62" fill="#d9534f" fill-opacity="0.10" stroke="#d9534f" stroke-width="1.4"/>
  <text x="497" y="90" text-anchor="middle" font-size="12" fill="#d9534f" font-weight="bold">Stream Identifier</text>
  <text x="497" y="106" text-anchor="middle" font-size="10" fill="#d9534f">31 bits (R is 1 reserved bit)</text>
  <text x="497" y="120" text-anchor="middle" font-size="10" fill="#d9534f">★ which request this frame belongs to ★</text>

  <rect x="40" y="150" width="600" height="44" fill="currentColor" fill-opacity="0.04" stroke="currentColor" stroke-width="1.4" stroke-dasharray="5,3"/>
  <text x="340" y="176" text-anchor="middle" font-size="11" fill="currentColor">Frame Payload (0 … Length bytes)</text>

  <text x="340" y="218" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.8">the Stream ID is what lets many requests ride a single TCP connection concurrently</text>
</svg>
