<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 720 210" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Stream tape metaphor: a STREAM frame with offset 0 and length 500 placed on the tape." style="max-width:100%;height:auto;display:block;margin:1.5rem auto" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
  <text x="360" y="22" text-anchor="middle" font-size="13" fill="currentColor" font-weight="bold">Stream 0's tape</text>
  <text x="360" y="38" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.7">one STREAM frame written at offset 0, length 500</text>

  <rect x="60" y="58" width="600" height="48" fill="currentColor" fill-opacity="0.10" stroke="currentColor" stroke-width="1.4"/>
  <text x="360" y="88" text-anchor="middle" font-size="12" fill="currentColor">HEADERS frame — 500 bytes of H3 data</text>

  <line x1="60" y1="126" x2="660" y2="126" stroke="currentColor" stroke-width="1.2"/>
  <line x1="60"  y1="120" x2="60"  y2="134" stroke="currentColor" stroke-width="1.2"/>
  <line x1="180" y1="122" x2="180" y2="130" stroke="currentColor" stroke-width="1"/>
  <line x1="300" y1="122" x2="300" y2="130" stroke="currentColor" stroke-width="1"/>
  <line x1="420" y1="122" x2="420" y2="130" stroke="currentColor" stroke-width="1"/>
  <line x1="540" y1="122" x2="540" y2="130" stroke="currentColor" stroke-width="1"/>
  <line x1="660" y1="120" x2="660" y2="134" stroke="currentColor" stroke-width="1.2"/>

  <text x="60"  y="148" text-anchor="middle" font-size="10" fill="currentColor">0</text>
  <text x="180" y="148" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.7">100</text>
  <text x="300" y="148" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.7">200</text>
  <text x="420" y="148" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.7">300</text>
  <text x="540" y="148" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.7">400</text>
  <text x="660" y="148" text-anchor="middle" font-size="10" fill="currentColor">500</text>
  <text x="360" y="168" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.6">byte position on the tape</text>

  <text x="60"  y="194" text-anchor="middle" font-size="11" fill="#d9534f">offset = 0</text>
  <text x="660" y="194" text-anchor="middle" font-size="11" fill="#d9534f">offset + length = 500</text>
</svg>
