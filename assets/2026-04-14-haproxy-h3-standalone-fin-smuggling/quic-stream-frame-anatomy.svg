<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="STREAM frame structure: top row shows the field layout, bottom row zooms into the Type byte to reveal the OFF/LEN/FIN flag bits." style="max-width:100%;height:auto;display:block;margin:1.5rem auto" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
  <text x="400" y="22" text-anchor="middle" font-size="13" fill="currentColor" font-weight="bold">STREAM frame structure (RFC 9000 §19.8)</text>

  <text x="400" y="50" text-anchor="middle" font-size="11" fill="currentColor" opacity="0.75">— field layout —</text>

  <!-- Field layout boxes: Type, Stream ID, Offset, Length, Stream Data -->
  <rect x="40"  y="62" width="80"  height="78" fill="#d9534f" fill-opacity="0.10" stroke="#d9534f" stroke-width="1.6"/>
  <text x="80"  y="84"  text-anchor="middle" font-size="12" fill="#d9534f" font-weight="bold">Type</text>
  <text x="80"  y="102" text-anchor="middle" font-size="10" fill="#d9534f">8 bits</text>
  <text x="80"  y="120" text-anchor="middle" font-size="10" fill="#d9534f">always</text>

  <rect x="130" y="62" width="120" height="78" fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.4"/>
  <text x="190" y="84"  text-anchor="middle" font-size="12" fill="currentColor">Stream ID</text>
  <text x="190" y="102" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.8">varint</text>
  <text x="190" y="120" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.8">always</text>

  <rect x="260" y="62" width="120" height="78" fill="currentColor" fill-opacity="0.04" stroke="currentColor" stroke-width="1.4" stroke-dasharray="5,3"/>
  <text x="320" y="84"  text-anchor="middle" font-size="12" fill="currentColor">Offset</text>
  <text x="320" y="102" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.8">varint</text>
  <text x="320" y="120" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.8">only if OFF flag</text>

  <rect x="390" y="62" width="120" height="78" fill="currentColor" fill-opacity="0.04" stroke="currentColor" stroke-width="1.4" stroke-dasharray="5,3"/>
  <text x="450" y="84"  text-anchor="middle" font-size="12" fill="currentColor">Length</text>
  <text x="450" y="102" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.8">varint</text>
  <text x="450" y="120" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.8">only if LEN flag</text>

  <rect x="540" y="62" width="220" height="78" fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.4"/>
  <text x="650" y="84"  text-anchor="middle" font-size="12" fill="currentColor">Stream Data</text>
  <text x="650" y="102" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.8">variable (may be empty)</text>
  <text x="650" y="120" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.8">length implied if LEN flag is unset</text>

  <!-- Connector lines: zoom from Type box (top) to bit-level box (bottom).
       Straight diagonals from the bottom corners of Type to the top corners of the bit row. -->
  <path d="M40 140 L130 242"  stroke="#d9534f" stroke-width="1" stroke-dasharray="3,2" fill="none" opacity="0.55"/>
  <path d="M120 140 L660 242" stroke="#d9534f" stroke-width="1" stroke-dasharray="3,2" fill="none" opacity="0.55"/>

  <!-- Type byte zoom: 8 bit boxes -->
  <text x="400" y="216" text-anchor="middle" font-size="11" fill="currentColor" opacity="0.75">— Type byte: 1 of 8 values from 0x08 to 0x0f —</text>

  <text x="160" y="234" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.6">bit 7</text>
  <text x="220" y="234" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.6">6</text>
  <text x="280" y="234" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.6">5</text>
  <text x="340" y="234" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.6">4</text>
  <text x="400" y="234" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.6">3</text>
  <text x="490" y="234" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.6">2</text>
  <text x="560" y="234" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.6">1</text>
  <text x="630" y="234" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.6">bit 0</text>

  <!-- Bits 7..3: fixed prefix "00001" -->
  <rect x="130" y="242" width="60" height="56" fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.4"/>
  <text x="160" y="280" text-anchor="middle" font-size="20" fill="currentColor">0</text>
  <rect x="190" y="242" width="60" height="56" fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.4"/>
  <text x="220" y="280" text-anchor="middle" font-size="20" fill="currentColor">0</text>
  <rect x="250" y="242" width="60" height="56" fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.4"/>
  <text x="280" y="280" text-anchor="middle" font-size="20" fill="currentColor">0</text>
  <rect x="310" y="242" width="60" height="56" fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.4"/>
  <text x="340" y="280" text-anchor="middle" font-size="20" fill="currentColor">0</text>
  <rect x="370" y="242" width="60" height="56" fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.4"/>
  <text x="400" y="280" text-anchor="middle" font-size="20" fill="currentColor">1</text>

  <!-- Bits 2..0: flag bits, with extra horizontal spacing -->
  <rect x="460" y="242" width="60" height="56" fill="#d9534f" fill-opacity="0.10" stroke="#d9534f" stroke-width="1.6"/>
  <text x="490" y="280" text-anchor="middle" font-size="20" fill="#d9534f" font-weight="bold">O</text>
  <rect x="530" y="242" width="60" height="56" fill="#d9534f" fill-opacity="0.10" stroke="#d9534f" stroke-width="1.6"/>
  <text x="560" y="280" text-anchor="middle" font-size="20" fill="#d9534f" font-weight="bold">L</text>
  <rect x="600" y="242" width="60" height="56" fill="#d9534f" fill-opacity="0.10" stroke="#d9534f" stroke-width="1.6"/>
  <text x="630" y="280" text-anchor="middle" font-size="20" fill="#d9534f" font-weight="bold">F</text>

  <!-- Brace under fixed prefix bits 7..3 -->
  <path d="M130 310 L430 310" stroke="currentColor" stroke-width="1" opacity="0.6" fill="none"/>
  <path d="M130 306 L130 314" stroke="currentColor" stroke-width="1" opacity="0.6"/>
  <path d="M430 306 L430 314" stroke="currentColor" stroke-width="1" opacity="0.6"/>
  <text x="280" y="328" text-anchor="middle" font-size="11" fill="currentColor">fixed prefix "00001" — identifies "STREAM"</text>

  <!-- Per-flag annotations: name, then meaning, well separated -->
  <text x="490" y="328" text-anchor="middle" font-size="11" fill="#d9534f" font-weight="bold">OFF</text>
  <text x="490" y="346" text-anchor="middle" font-size="9"  fill="currentColor" opacity="0.8">is Offset</text>
  <text x="490" y="358" text-anchor="middle" font-size="9"  fill="currentColor" opacity="0.8">present?</text>

  <text x="560" y="328" text-anchor="middle" font-size="11" fill="#d9534f" font-weight="bold">LEN</text>
  <text x="560" y="346" text-anchor="middle" font-size="9"  fill="currentColor" opacity="0.8">is Length</text>
  <text x="560" y="358" text-anchor="middle" font-size="9"  fill="currentColor" opacity="0.8">present?</text>

  <text x="630" y="328" text-anchor="middle" font-size="11" fill="#d9534f" font-weight="bold">FIN</text>
  <text x="630" y="346" text-anchor="middle" font-size="9"  fill="currentColor" opacity="0.8">is stream</text>
  <text x="630" y="358" text-anchor="middle" font-size="9"  fill="currentColor" opacity="0.8">finished?</text>

  <!-- Footer separator + summary -->
  <line x1="40" y1="390" x2="760" y2="390" stroke="currentColor" stroke-width="1" opacity="0.4" stroke-dasharray="3,3"/>
  <text x="400" y="412" text-anchor="middle" font-size="11" fill="currentColor" opacity="0.85">The three flag bits in the Type byte control the field layout above:</text>
  <text x="400" y="430" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.7">OFF=1 → an Offset field appears · LEN=1 → a Length field appears · FIN=1 → the stream ends with this frame</text>
  <text x="400" y="448" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.7">When LEN is 0, Stream Data extends to the end of the QUIC packet — possibly zero bytes.</text>
  <text x="400" y="476" text-anchor="middle" font-size="11" fill="#d9534f" font-weight="bold">★ 0x0d = 0b00001101 = OFF set, LEN clear, FIN set — the standalone-FIN frame ★</text>
</svg>
